<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ReimbursePro</title>
    <meta name="description" content="Sign in to your account with ReimbursePro.">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="auth-body">

    <div class="brand-header">
        <div class="logo-wrapper">
            <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="40" height="40" rx="10" fill="#10B981"/>
                <!-- Stacked Cash Bills -->
                <rect x="8" y="10" width="22" height="14" rx="1.5" stroke="white" stroke-width="2" fill="none"/>
                <rect x="12" y="15" width="22" height="14" rx="1.5" stroke="white" stroke-width="2" fill="#10B981"/>
                <circle cx="23" cy="22" r="3" stroke="white" stroke-width="1.5"/>
                <circle cx="17" cy="22" r="1.2" fill="white"/>
                <circle cx="29" cy="22" r="1.2" fill="white"/>
                <path d="M15 18C15 17.4477 15.4477 17 16 17H30C30.5523 17 31 17.4477 31 18V26C31 26.5523 30.5523 27 30 27H16C15.4477 27 15 26.5523 15 26V18Z" stroke="white" stroke-width="0.5" stroke-dasharray="1 1"/>
            </svg>
            <div class="brand-name">Reimburse<span>Pro</span></div>
        </div>
        <div class="brand-subtitle">Sign in to your account</div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <form id="loginForm" novalidate>
                <div class="form-group" id="emailGroup">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="you@company.com" required>
                    <div class="error-message">Please enter a valid email address.</div>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                        <button type="button" class="eye-toggle" id="togglePassword">
                            <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.644C3.301 8.844 6.94 5 12 5c5.06 0 8.701 3.844 9.964 6.678a1.012 1.012 0 010 .644C20.699 15.156 17.06 19 12 19c-5.06 0-8.701-3.844-9.964-6.678z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <svg id="eyeHide" style="display:none" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                        </button>
                    </div>
                    <div class="error-message">Password is required.</div>
                </div>

                <button type="submit" class="btn-primary">
                    Login
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                    </svg>
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>

</body>
</html>
